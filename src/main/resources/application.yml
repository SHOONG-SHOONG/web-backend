spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shoong
    username: user1
    password: user1
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 시에는 update, 운영 배포 시에는 validate 추천
    show-sql: true        # 콘솔에 SQL 찍힘
    properties:
      hibernate:
        format_sql: true  # SQL 보기 좋게 정렬
    database-platform: org.hibernate.dialect.MySQL8Dialect  # MySQL8 기준

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${REST_API_KEY}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}
      path:
        item: ${AWS_BUCKET_ITEM}
        live: ${AWS_BUCKET_LIVE}
    stack:
      auto: false

server:
  port: 8088
server:
  port: 8080
  forward-headers-strategy: framework
spring:
  jwt:
    secret: 시크릿 키
  application:
    name: web_backend

  datasource:
    url: jdbc:mysql://localhost:3306/shoong?serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create   # 개발 시에는 update, 운영 배포 시에는 validate 추천
    show-sql: true        # 콘솔에 SQL 찍힘
    properties:
      hibernate:
        format_sql: true  # SQL 보기 좋게 정렬
    database-platform: org.hibernate.dialect.MySQL8Dialect  # MySQL8 기준

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: kakao Rest API KEY
            redirect-uri: KAKAO 리다이렉트 URI # http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
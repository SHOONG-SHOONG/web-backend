server:
  port : 8088

spring:
  datasource:
    url: jdbc:mysql://3.35.238.35:3306/shoong?serverTimezone=Asia/Seoul
    username: shoong
    password: shoong
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 시에는 update, 운영 배포 시에는 validate 추천
    show-sql: true        # 콘솔에 SQL 찍힘
    properties:
      hibernate:
        format_sql: true  # SQL 보기 좋게 정렬
    database-platform: org.hibernate.dialect.MySQL8Dialect  # MySQL8 기준

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${REST_API_KEY}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

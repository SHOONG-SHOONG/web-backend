server:
  port: 8080
  forward-headers-strategy: framework
spring:
  servlet:
    multipart:
      max-file-size: 10MB       # 최대 업로드 파일 크기
      max-request-size: 15MB    # 요청 전체 크기 (여러 파일일 경우 고려)
  jwt:
    secret: vmfhaltmskdlstkfkdgodyroqkfwkdbalroqkfwkdbalaaaaaaaaaaaaaaaabbbbb
  application:
    name: web_backend

  datasource:
    url: jdbc:mysql://mysql:3306/shoong?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # 개발 시에는 create 또는 update 사용
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true


  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${REST_API_KEY}
            redirect-uri: https://api.shoong.store/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME}
      path:
        item: item
        live: live
        brand: brand
    stack:
      auto: false
management:
  endpoints:
    web:
      exposure:
        include: 'health,info,prometheus'
  endpoint:
    prometheus:
      enabled: true
